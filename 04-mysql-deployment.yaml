---
# ============================================================
# Deployment MySQL — 1 seul réplicat (exigence du TP)
# Les scripts SQL sont montés dans /docker-entrypoint-initdb.d/
# MySQL les exécute automatiquement à la première initialisation
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: default
  labels:
    app: paymybuddy
    tier: database
spec:
  replicas: 1
  selector:
    matchLabels:
      app: paymybuddy
      tier: database
  # Recreate obligatoire : MySQL ne supporte pas le rolling update avec 1 seul réplicat
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: paymybuddy
        tier: database
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          ports:
            - containerPort: 3306
              name: mysql
          env:
            # MYSQL_ROOT_PASSWORD : issu du Secret (valeur "password" comme dans le Dockerfile)
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: mysql-root-password
            # MYSQL_DATABASE : crée automatiquement la BDD db_paymybuddy au démarrage
            - name: MYSQL_DATABASE
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: mysql-database
          volumeMounts:
            # Données persistées dans /data du nœud via le PVC
            - name: mysql-data
              mountPath: /var/lib/mysql
            # Scripts SQL montés pour initialisation automatique au premier démarrage
            - name: mysql-initdb
              mountPath: /docker-entrypoint-initdb.d
          livenessProbe:
            exec:
              command: ["mysqladmin", "ping", "-h", "localhost", "-u", "root", "-ppassword"]
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command: ["mysqladmin", "ping", "-h", "localhost", "-u", "root", "-ppassword"]
            initialDelaySeconds: 15
            periodSeconds: 5
            timeoutSeconds: 3
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        # Volume persistant (hostPath: /data/mysql sur le nœud)
        - name: mysql-data
          persistentVolumeClaim:
            claimName: mysql-pvc
        # ConfigMap contenant les scripts SQL d'init (create.sql + data.sql)
        - name: mysql-initdb
          configMap:
            name: mysql-initdb-config

---
# ============================================================
# Service MySQL — ClusterIP
# Accessible uniquement en interne via le DNS "mysql:3306"
# C'est exactement l'adresse attendue dans SPRING_DATASOURCE_URL
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: default
  labels:
    app: paymybuddy
    tier: database
spec:
  type: ClusterIP
  selector:
    app: paymybuddy
    tier: database
  ports:
    - name: mysql
      port: 3306
      targetPort: 3306
      protocol: TCP

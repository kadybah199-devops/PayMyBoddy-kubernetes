---
# ============================================================
# Deployment PayMyBuddy (application SpringBoot)
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: paymybuddy
  namespace: default
  labels:
    app: paymybuddy
    tier: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: paymybuddy
      tier: frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: paymybuddy
        tier: frontend
    spec:
      # S'assurer que MySQL est disponible avant de démarrer PayMyBuddy
      initContainers:
        - name: wait-for-mysql
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z mysql 3306; do
                echo "En attente de MySQL..."
                sleep 3
              done
              echo "MySQL est disponible !"
      containers:
        - name: paymybuddy
          image: eazytraining/paymybuddy:latest
          ports:
            - containerPort: 8080
              name: http
          env:
            # Variables d'environnement pour la connexion à MySQL
            # (issues du Dockerfile eazytraining/paymybuddy)
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:mysql://mysql:3306/paymybuddy?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true"
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: mysql-user
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: mysql-password
            - name: SPRING_JPA_HIBERNATE_DDL_AUTO
              value: "update"
            - name: SPRING_JPA_DATABASE_PLATFORM
              value: "org.hibernate.dialect.MySQL8Dialect"
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"

---
# ============================================================
# Service PayMyBuddy - NodePort (accessible depuis l'extérieur)
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: paymybuddy
  namespace: default
  labels:
    app: paymybuddy
    tier: frontend
spec:
  type: NodePort
  selector:
    app: paymybuddy
    tier: frontend
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      # NodePort entre 30000-32767 ; laisser Kubernetes choisir ou fixer un port
      nodePort: 30080
      protocol: TCP

---
# PersistentVolume : stockage physique sur le nœud dans /data
# Le TP demande explicitement de stocker les données dans /data du nœud
apiVersion: v1
kind: PersistentVolume
metadata:
  name: mysql-pv
  labels:
    app: paymybuddy
spec:
  storageClassName: manual
  capacity:
    storage: 5Gi
  accessModes:
    - ReadWriteOnce
  hostPath:
    path: "/data/mysql"       # Données stockées dans /data du nœud (exigence du TP)
  persistentVolumeReclaimPolicy: Retain

---
# PersistentVolumeClaim : réclame le PV ci-dessus
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql-pvc
  namespace: default
  labels:
    app: paymybuddy
spec:
  storageClassName: manual
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi

---
# ============================================================
# Deployment PayMyBuddy (SpringBoot)
#
# AVANT d'appliquer ce manifest, builder l'image sur node1 :
#   mvn clean install
#   docker build -t paymybuddy:latest .
#
# Variables d'environnement issues du Dockerfile officiel :
#   SPRING_DATASOURCE_USERNAME=root
#   SPRING_DATASOURCE_PASSWORD=password
#   SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/db_paymybuddy
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: paymybuddy
  namespace: default
  labels:
    app: paymybuddy
    tier: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: paymybuddy
      tier: frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: paymybuddy
        tier: frontend
    spec:
      # initContainer : attend que MySQL soit prêt sur le port 3306
      initContainers:
        - name: wait-for-mysql
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Attente de MySQL sur mysql:3306..."
              until nc -z mysql 3306; do
                echo "MySQL pas encore prêt, nouvelle tentative dans 3s..."
                sleep 3
              done
              echo "MySQL est disponible ! Démarrage de PayMyBuddy..."
      containers:
        - name: paymybuddy
          image: kady199/paymyboddy-backend:latest
          # Always = toujours puller depuis Docker Hub (image publique disponible)
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: mysql-username

            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: mysql-password

            - name: SPRING_DATASOURCE_URL
              value: "jdbc:mysql://mysql:3306/db_paymybuddy?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true"

          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 45
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"

---
apiVersion: v1
kind: Service
metadata:
  name: paymybuddy
  namespace: default
  labels:
    app: paymybuddy
    tier: frontend
spec:
  type: NodePort
  selector:
    app: paymybuddy
    tier: frontend
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 30080
      protocol: TCP

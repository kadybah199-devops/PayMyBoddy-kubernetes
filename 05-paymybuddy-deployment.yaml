---
# ============================================================
# Deployment PayMyBuddy (SpringBoot)
#
# Variables d'environnement issues du Dockerfile officiel :
#   SPRING_DATASOURCE_USERNAME=root
#   SPRING_DATASOURCE_PASSWORD=password
#   SPRING_DATASOURCE_URL=jdbc:mysql://<host>:3306/db_paymybuddy
#
# En K8s, l'URL pointe vers le Service ClusterIP "mysql:3306"
# au lieu de l'IP docker0 (172.17.0.1) utilisée en local.
# Les credentials sont surchargés depuis le Secret Kubernetes.
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: paymybuddy
  namespace: default
  labels:
    app: paymybuddy
    tier: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: paymybuddy
      tier: frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: paymybuddy
        tier: frontend
    spec:
      # initContainer : attend que MySQL soit prêt sur le port 3306
      # avant de démarrer l'application SpringBoot
      initContainers:
        - name: wait-for-mysql
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Attente de MySQL sur mysql:3306..."
              until nc -z mysql 3306; do
                echo "MySQL pas encore prêt, nouvelle tentative dans 3s..."
                sleep 3
              done
              echo "MySQL est disponible ! Démarrage de PayMyBuddy..."
      containers:
        - name: paymybuddy
          # Image buildée localement avec : mvn clean install && docker build -t paymybuddy:latest .
          # Sur Minikube : eval $(minikube docker-env) avant le build
          image: paymybuddy:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            # -------------------------------------------------------
            # Variables issues du Dockerfile officiel PayMyBuddy
            # Surchargées depuis le Secret pour éviter les mots de passe en clair
            # -------------------------------------------------------

            # Utilisateur MySQL (root, comme dans le Dockerfile)
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: mysql-username

            # Mot de passe MySQL (password, comme dans le Dockerfile)
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: mysql-password

            # URL JDBC : en K8s on remplace 172.17.0.1 par le nom DNS du Service ClusterIP "mysql"
            # Le nom de la base db_paymybuddy est identique à la config locale
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:mysql://mysql:3306/db_paymybuddy?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true"

          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 45
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"

---
# ============================================================
# Service PayMyBuddy — NodePort
# Expose l'application sur le port 30080 de chaque nœud
# Accès : http://<NODE_IP>:30080
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: paymybuddy
  namespace: default
  labels:
    app: paymybuddy
    tier: frontend
spec:
  type: NodePort
  selector:
    app: paymybuddy
    tier: frontend
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 30080
      protocol: TCP

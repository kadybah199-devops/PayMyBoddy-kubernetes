apiVersion: apps/v1
kind: Deployment
metadata:
  name: paymybuddy
  namespace: default
  labels:
    app: paymybuddy
    tier: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: paymybuddy
      tier: frontend
  template:
    metadata:
      labels:
        app: paymybuddy
        tier: frontend
    spec:
      initContainers:
        - name: wait-for-mysql
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Attente de MySQL sur mysql:3306..."
              until nc -z mysql 3306; do
                echo "MySQL pas encore prêt, nouvelle tentative dans 3s..."
                sleep 3
              done
              echo "MySQL est disponible !"

      containers:
        - name: paymybuddy
          image: kady199/paymybuddy:1.0
          imagePullPolicy: Always

          ports:
            - containerPort: 8080

          env:
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: mysql-username

            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: mysql-password

            - name: SPRING_DATASOURCE_URL
              value: "jdbc:mysql://mysql:3306/db_paymybuddy?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true"

          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"

---
apiVersion: v1
kind: Service
metadata:
  name: paymybuddy
  namespace: default
  labels:
    app: paymybuddy
    tier: frontend
spec:
  type: NodePort
  selector:
    app: paymybuddy
    tier: frontend
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080
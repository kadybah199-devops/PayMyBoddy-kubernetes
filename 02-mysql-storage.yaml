---
# PersistentVolume - stockage sur le nœud dans /data
apiVersion: v1
kind: PersistentVolume
metadata:
  name: mysql-pv
  labels:
    app: paymybuddy
    type: local
spec:
  storageClassName: manual
  capacity:
    storage: 5Gi
  accessModes:
    - ReadWriteOnce
  # Données stockées dans /data du nœud (comme demandé dans le TP)
  hostPath:
    path: "/data/mysql"
  persistentVolumeReclaimPolicy: Retain

---
# PersistentVolumeClaim - réclame le PV ci-dessus
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql-pvc
  namespace: default
  labels:
    app: paymybuddy
spec:
  storageClassName: manual
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi

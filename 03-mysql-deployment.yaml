---
# ============================================================
# Deployment MySQL - 1 seul réplicat (stateful)
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: default
  labels:
    app: paymybuddy
    tier: database
spec:
  replicas: 1
  selector:
    matchLabels:
      app: paymybuddy
      tier: database
  # Stratégie Recreate : obligatoire pour MySQL (pas de rolling update avec 1 seul réplicat)
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: paymybuddy
        tier: database
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          ports:
            - containerPort: 3306
              name: mysql
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: mysql-root-password
            - name: MYSQL_DATABASE
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: mysql-database
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: mysql-user
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: mysql-password
          volumeMounts:
            - name: mysql-storage
              mountPath: /var/lib/mysql
          # Healthcheck pour s'assurer que MySQL est prêt avant que PayMyBuddy se connecte
          livenessProbe:
            exec:
              command:
                - mysqladmin
                - ping
                - -h
                - localhost
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - mysqladmin
                - ping
                - -h
                - localhost
            initialDelaySeconds: 15
            periodSeconds: 5
            timeoutSeconds: 3
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: mysql-storage
          persistentVolumeClaim:
            claimName: mysql-pvc

---
# ============================================================
# Service MySQL - ClusterIP (accessible uniquement en interne)
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: default
  labels:
    app: paymybuddy
    tier: database
spec:
  type: ClusterIP
  selector:
    app: paymybuddy
    tier: database
  ports:
    - name: mysql
      port: 3306
      targetPort: 3306
      protocol: TCP
